name: Build and Upload iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      KEY_PATH: /Users/runner/private_keys

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.2'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          BASE_SERVICE_URL=https://miximike.com/
          DEFAULT_DAYS_TO_NOTIFY=10
          WORDPRESS_NOTIFICATION_CATEGORY_ID=54
          WOOCOMMERCE_CONSUMER_KEY=ck_eb0c4aa99877a39ccbeae48006be26c31e276d14
          WOOCOMMERCE_CONSUMER_SECRET=cs_091280b80fc57add0e19c5a976099742a6f4ea19
          WOOCOMMERCE_EXCLUDE_PRODUCTS_ID=[279797]
          WOOCOMMERCE_EXCLUDE_CATEGORIES_ID=[40, 41, 53]
          WOOCOMMERCE_TODO_CATEGORY_ID=53
          DISK_FOR_ALL_ID=255
          WORDPRESS_ADMIN_TOKEN="ZGllZ29AZnJpam9sLmNsOjVfM09pWmFRMyF9UShlM04yMF82"
          ENVEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p $KEY_PATH
          echo '${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}' > $KEY_PATH/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          chmod 600 $KEY_PATH/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Build Flutter iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Archive with Xcode
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath $KEY_PATH/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=45VD6AMQZF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath $KEY_PATH/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # Upload happens automatically during export (destination: upload in ExportOptions.plist)
      - name: Verify upload
        run: echo "Export and upload to App Store Connect completed successfully"
